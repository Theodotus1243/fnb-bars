name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download and Extract FFmpeg
      run: |
        # Download the latest static FFmpeg build for Windows
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        # Extract the archive
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        # Move ffmpeg.exe to the root directory so PyInstaller can find it
        Copy-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "."
      shell: powershell

    - name: Build executable with PyInstaller
      run: |
        pyinstaller build.spec

    - name: Zip distribution folder
      run: |
        Compress-Archive -Path "dist\F&B's Bars" -DestinationPath "FnBs_Bars_Windows.zip"
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FnBs_Bars_Windows
        path: FnBs_Bars_Windows.zip
