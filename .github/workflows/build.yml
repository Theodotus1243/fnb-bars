name: Build and Release Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # Needed to create releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get Version
      id: get_version
      run: |
        $ver = Get-Content VERSION -Raw
        $ver = $ver.Trim()
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Download and Extract FFmpeg
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        Copy-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "."
      shell: powershell

    - name: Build executable with PyInstaller
      run: |
        pyinstaller build.spec

    - name: Zip distribution folder
      run: |
        Compress-Archive -Path "dist\F&B's Bars" -DestinationPath "FnBs_Bars_Windows.zip"
      shell: powershell

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}-b${{ github.run_number }}
        name: Release v${{ steps.get_version.outputs.VERSION }} (Build ${{ github.run_number }})
        files: FnBs_Bars_Windows.zip
        body: |
          Automated build of F&B's Bars.
          Version: ${{ steps.get_version.outputs.VERSION }}
          Build: ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (For testing)
      uses: actions/upload-artifact@v4
      with:
        name: FnBs_Bars_Windows_Artifact
        path: "dist/F&B's Bars"
